# Конфигурация ESPHome для TCL/Ballu с 65-байтовым ответом UART.
# Перед прошивкой заполните examples/secrets.yaml.example в своём secrets.yaml.

substitutions:
  device_name: ballu-tcl-ac
  friendly_name: Ballu TCL AC
  climate_name: Кондиционер
  uart_tx_pin: GPIO3
  uart_rx_pin: GPIO1

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: arduino

# Функция: подключает локальный внешний компонент из папки репозитория.
external_components:
  - source:
      type: local
      path: components
    components:
      - tcl_climate

logger:
  level: INFO
  baud_rate: 0
  tx_buffer_size: 2048

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none

  ap:
    ssid: "${friendly_name} Recovery"
    password: !secret fallback_ap_password
    ap_timeout: 60s

captive_portal:

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

uart:
  id: uart_bus
  tx_pin: ${uart_tx_pin}
  rx_pin: ${uart_rx_pin}
  baud_rate: 9600
  data_bits: 8
  parity: EVEN
  stop_bits: 1
  rx_buffer_size: 256

climate:
  - platform: tcl_climate
    id: tcl_ac_climate
    uart_id: uart_bus
    name: ${climate_name}
    update_interval: 3s

# Функция: даёт точное управление вертикальными жалюзи.
select:
  - platform: template
    name: "Вертикальные жалюзи"
    id: vertical_louver_position
    icon: "mdi:arrow-up-down"
    optimistic: true
    restore_value: true
    initial_option: "Остановить / последнее положение"
    options:
      - "Остановить / последнее положение"
      - "Качание: весь диапазон"
      - "Качание: верхняя часть"
      - "Качание: нижняя часть"
      - "Фиксация: сверху"
      - "Фиксация: выше середины"
      - "Фиксация: по центру"
      - "Фиксация: ниже середины"
      - "Фиксация: снизу"
    set_action:
      - lambda: |-
          // Функция: переводит выбранное вертикальное положение в команду TCL.
          if (x == "Качание: весь диапазон") {
            id(tcl_ac_climate).control_vertical_swing("Move full");
          } else if (x == "Качание: верхняя часть") {
            id(tcl_ac_climate).control_vertical_swing("Move upper");
          } else if (x == "Качание: нижняя часть") {
            id(tcl_ac_climate).control_vertical_swing("Move lower");
          } else if (x == "Фиксация: сверху") {
            id(tcl_ac_climate).control_vertical_swing("Fix top");
          } else if (x == "Фиксация: выше середины") {
            id(tcl_ac_climate).control_vertical_swing("Fix upper");
          } else if (x == "Фиксация: по центру") {
            id(tcl_ac_climate).control_vertical_swing("Fix mid");
          } else if (x == "Фиксация: ниже середины") {
            id(tcl_ac_climate).control_vertical_swing("Fix lower");
          } else if (x == "Фиксация: снизу") {
            id(tcl_ac_climate).control_vertical_swing("Fix bottom");
          } else {
            id(tcl_ac_climate).control_vertical_swing("Off");
          }
          // Пример вызова: «Фиксация: по центру» вызывает Fix mid.

  # Функция: даёт точное управление горизонтальными жалюзи.
  - platform: template
    name: "Горизонтальные жалюзи"
    id: horizontal_louver_position
    icon: "mdi:arrow-left-right"
    optimistic: true
    restore_value: true
    initial_option: "Остановить / последнее положение"
    options:
      - "Остановить / последнее положение"
      - "Качание: весь диапазон"
      - "Качание: левая часть"
      - "Качание: центральная часть"
      - "Качание: правая часть"
      - "Фиксация: слева"
      - "Фиксация: левее центра"
      - "Фиксация: по центру"
      - "Фиксация: правее центра"
      - "Фиксация: справа"
    set_action:
      - lambda: |-
          // Функция: переводит выбранное горизонтальное положение в команду TCL.
          if (x == "Качание: весь диапазон") {
            id(tcl_ac_climate).control_horizontal_swing("Move full");
          } else if (x == "Качание: левая часть") {
            id(tcl_ac_climate).control_horizontal_swing("Move left");
          } else if (x == "Качание: центральная часть") {
            id(tcl_ac_climate).control_horizontal_swing("Move mid");
          } else if (x == "Качание: правая часть") {
            id(tcl_ac_climate).control_horizontal_swing("Move right");
          } else if (x == "Фиксация: слева") {
            id(tcl_ac_climate).control_horizontal_swing("Fix left");
          } else if (x == "Фиксация: левее центра") {
            id(tcl_ac_climate).control_horizontal_swing("Fix mid left");
          } else if (x == "Фиксация: по центру") {
            id(tcl_ac_climate).control_horizontal_swing("Fix mid");
          } else if (x == "Фиксация: правее центра") {
            id(tcl_ac_climate).control_horizontal_swing("Fix mid right");
          } else if (x == "Фиксация: справа") {
            id(tcl_ac_climate).control_horizontal_swing("Fix right");
          } else {
            id(tcl_ac_climate).control_horizontal_swing("Off");
          }
          // Пример вызова: «Фиксация: по центру» вызывает Fix mid.

# Функция: управляет звуковым подтверждением и дисплеем внутреннего блока.
switch:
  - platform: template
    name: "Звуковое подтверждение"
    id: command_beeper
    icon: "mdi:volume-high"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    turn_on_action:
      - lambda: |-
          // Функция: включает писк при командах, отправляемых ESP32.
          id(tcl_ac_climate).set_beeper_enabled(true);
          // Пример вызова: включение switch вызывает set_beeper_enabled(true).
    turn_off_action:
      - lambda: |-
          // Функция: отключает писк при командах, отправляемых ESP32.
          id(tcl_ac_climate).set_beeper_enabled(false);
          // Пример вызова: выключение switch вызывает set_beeper_enabled(false).

  - platform: template
    name: "Дисплей кондиционера"
    id: indoor_unit_display
    icon: "mdi:monitor"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    turn_on_action:
      - lambda: |-
          // Функция: включает индикацию внутреннего блока.
          id(tcl_ac_climate).set_display_enabled(true);
          // Пример вызова: включение switch вызывает set_display_enabled(true).
    turn_off_action:
      - lambda: |-
          // Функция: выключает индикацию внутреннего блока.
          id(tcl_ac_climate).set_display_enabled(false);
          // Пример вызова: выключение switch вызывает set_display_enabled(false).
